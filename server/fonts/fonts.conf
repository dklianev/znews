<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Load bundled fonts for Sharp/librsvg Cyrillic rendering on servers without system fonts -->
  <dir>FONTDIR_PLACEHOLDER</dir>

  <!-- Map common generic names to Noto Sans -->
  <alias>
    <family>sans-serif</family>
    <prefer><family>Noto Sans</family></prefer>
  </alias>
  <alias>
    <family>Arial</family>
    <prefer><family>Noto Sans</family></prefer>
  </alias>
  <alias>
    <family>Segoe UI</family>
    <prefer><family>Noto Sans</family></prefer>
  </alias>
  <alias>
    <family>DejaVu Sans</family>
    <prefer><family>Noto Sans</family></prefer>
  </alias>
  <alias>
    <family>DejaVu Sans Condensed</family>
    <prefer><family>Noto Sans</family></prefer>
  </alias>
  <alias>
    <family>Liberation Sans</family>
    <prefer><family>Noto Sans</family></prefer>
  </alias>
</fontconfig>
