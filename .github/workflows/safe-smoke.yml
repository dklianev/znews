name: Safe Smoke

on:
  push:
    branches:
      - main
      - 'codex/**'
  pull_request:

permissions:
  contents: read

jobs:
  safe-smoke:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test

      - name: Run server syntax checks
        run: npm run check:server

      - name: Build app
        run: npm run build

      - name: Audit bundle performance
        run: npm run audit:perf

      - name: Run safe smoke
        run: npm run smoke:safe
