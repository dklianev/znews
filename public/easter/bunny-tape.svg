<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 32" width="72" height="32" fill="none">
  <!-- Tape strip -->
  <rect x="0" y="14" width="72" height="18" rx="1" fill="#FDE68A" opacity="0.82" stroke="#D4A017" stroke-width="0.5"/>
  <rect x="0" y="14" width="72" height="18" rx="1" fill="url(#tapeHatch)" opacity="0.12"/>

  <!-- Left bunny ear -->
  <path d="M22 16 C20 4 16 0 14 0 C12 0 10 3 11 14 C11.2 15 12 16 14 16 Z"
        fill="#FDE68A" stroke="#D4A017" stroke-width="0.8"/>
  <path d="M18 14 C17 6 15 3 14.2 3 C13.4 3 12.5 5 12.8 13"
