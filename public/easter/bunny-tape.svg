  <!-- Right bunny ear -->
  <path d="M50 16 C52 4 56 0 58 0 C60 0 62 3 61 14 C60.8 15 60 16 58 16 Z"
        fill="#FDE68A" stroke="#D4A017" stroke-width="0.8"/>
  <path d="M54 14 C55 6 57 3 57.8 3 C58.6 3 59.5 5 59.2 13"
